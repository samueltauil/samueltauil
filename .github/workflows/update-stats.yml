name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download stats cards
        run: |
          mkdir -p assets
          curl -sL -o assets/github-stats.svg "https://github-readme-stats.vercel.app/api?username=samueltauil&show_icons=true&theme=dark&hide_border=true"
          curl -sL -o assets/top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=samueltauil&layout=compact&theme=dark&hide_border=true"

      - name: Validate SVGs
        run: |
          for f in assets/github-stats.svg assets/top-langs.svg; do
            if ! grep -q "<svg" "$f"; then
              echo "::warning::Invalid SVG response for $f, restoring previous version"
              git checkout -- "$f" 2>/dev/null || rm -f "$f"
            fi
          done

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/
          git diff --staged --quiet || (git commit -m "chore: update github stats cards" && git push)
